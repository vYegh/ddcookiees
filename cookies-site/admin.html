<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Order Tracker · The Bake Book — Cookies by DD &amp; Alexa</title>
<link rel="icon" href="assets/logo.png" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="admin.css" />
</head>
<body class="v2">

<!-- ===== PASSWORD GATE ===== -->
<div class="gate" id="gate">
  <form class="gate-card" id="gateForm">
    <img src="assets/logo.png" alt="" />
    <h1>The Bake Book</h1>
    <p>Enter the password to open the book.</p>
    <input type="password" id="gatePass" placeholder="Password" autocomplete="current-password" />
    <button type="submit" class="btn btn-primary">Unlock</button>
    <p class="gate-err" id="gateErr" hidden>Wrong password — try again.</p>
  </form>
</div>

<!-- ===== APP ===== -->
<div id="app" hidden>

<!-- ========== TOP BAR ========== -->
<header class="v2bar">
  <div class="v2bar-in">
    <a class="v2brand" href="index.html">
      <img src="assets/logo.png" alt="Cookies by DD &amp; Alexa" />
      <span><b>Cookies by DD &amp; Alexa</b><small>Order Tracker · the bake book</small></span>
    </a>
    <span class="sp"></span>
    <a class="v2link" href="orders.html?legacy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"></rect><rect x="9.5" y="3" width="5" height="12" rx="1"></rect><rect x="16" y="3" width="5" height="15" rx="1"></rect></svg>
      <span>Previous tracker</span>
    </a>
    <button class="v2link" id="refreshBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"></path></svg>
      <span>Refresh</span>
    </button>
    <button class="v2link" id="lockBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
      <span>Lock</span>
    </button>
  </div>
</header>

<main class="v2main">

  <!-- ========== RAIL ========== -->
  <aside class="rail">
    <div class="rail-head">
      <p class="eyebrow" id="greet">good morning</p>
      <h1>The Bake<br />Book</h1>
      <p class="rail-date" id="railDate">Today</p>
      <p class="m2-statline" id="statline"></p>
    </div>

    <label class="v2search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input type="text" id="search" placeholder="Search name, # or flavor…" />
    </label>

    <nav class="day-index" id="dayIndex"></nav>

    <div class="oven">
      <h2 class="eyebrow">today's oven</h2>
      <div id="ovenList"></div>
    </div>

    <dl class="ledger" id="ledger"></dl>

    <button class="btn-new" id="addBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
      New order
    </button>
  </aside>

  <!-- ========== AGENDA ========== -->
  <div class="book-col">
    <nav class="book-tabs" id="bookTabs">
      <button class="bt active" data-view="upcoming" type="button">In the book <span class="cnt" id="cntUp">0</span></button>
      <button class="bt" data-view="past" type="button">Past orders <span class="cnt" id="cntPast">0</span></button>
    </nav>
    <section class="book" id="book"></section>
    <p class="book-msg" id="bookMsg"></p>
  </div>

</main>
</div>

<!-- ========== ADD-ORDER MODAL ========== -->
<div class="v2modal-back" id="addBack">
  <div class="v2modal">
    <button class="x" id="addClose" type="button" aria-label="Close">×</button>
    <p class="eyebrow">new ticket</p>
    <h3>Add an Order</h3>
    <form id="addForm" autocomplete="off">
      <div class="field-row">
        <div class="field"><label>Customer Name</label><input type="text" id="f-name" placeholder="e.g. Maya Rodriguez" /></div>
        <div class="field"><label>Phone / contact</label><input type="text" id="f-phone" placeholder="(415) 555-0000 or @handle" /></div>
      </div>

      <div class="field">
        <label>Fulfillment</label>
        <div class="seg-radio2">
          <label><input type="radio" name="method" value="Delivery" checked /><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 16V6a1 1 0 0 1 1-1h11v11M13 8h4l3 4v4M5.5 19a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm12 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM7 16h7"></path></svg>Delivery</span></label>
          <label><input type="radio" name="method" value="Pickup" /><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l1 12H5L6 8Z"></path><path d="M9 8a3 3 0 0 1 6 0"></path></svg>Pickup</span></label>
          <label><input type="radio" name="method" value="Catering" /><span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4v4h16V7Z"></path><path d="M5 11v9h14v-9M12 7v13M12 7s-1.5-4-4-4-1.5 4 4 4Zm0 0s1.5-4 4-4 1.5 4-4 4Z"></path></svg>Catering</span></label>
        </div>
      </div>

      <div class="field" id="addrField">
        <label>Delivery Address</label>
        <input type="text" id="f-addr" placeholder="Street, unit, city" />
      </div>

      <div class="field-row">
        <div class="field"><label>Date Needed</label><input type="date" id="f-date" /></div>
        <div class="field"><label>Time</label><input type="time" id="f-time" value="12:00" /></div>
      </div>

      <div class="field">
        <label>Cookies</label>
        <div class="item-rows" id="itemRows"></div>
        <button type="button" class="add-item-btn" id="addItemBtn">+ Add another flavor</button>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Payment method</label>
          <select id="f-pay">
            <option value="">—</option>
            <option>Cash</option>
            <option>Cash App</option>
            <option>Apple Cash (NOT tap)</option>
            <option>Zelle</option>
            <option>Venmo</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Already paid?</label>
          <label class="paid-row"><input type="checkbox" id="f-paid" /><i class="v2switch"></i></label>
        </div>
      </div>

      <div class="field">
        <label>Notes · allergies · special requests</label>
        <textarea id="f-notes" placeholder="e.g. nut allergy, leave at door, pink sprinkles…"></textarea>
      </div>

      <div class="add-foot">
        <button type="button" class="btn-cancel" id="addCancel">Cancel</button>
        <button type="submit" class="btn-new">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
          Save Order
        </button>
      </div>
    </form>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
